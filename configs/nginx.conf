server {
    listen 80;
    http2 on;

    server_name athena.manti.by;
    return 301 https://athena.manti.by$request_uri;
}

server {
    server_name athena.manti.by;

    listen 443 quic reuseport;
    listen 443 ssl;
    http2 on;

    charset utf-8;
    client_max_body_size 10M;

    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    fastcgi_read_timeout  300s;

    location /static/ {
        alias /home/manti/www/athena/athena/static/;

        if ($request_filename ~ "^.*/(.+\.(jpe?g|png|svg|avif|js|css|webm|mp4|pdf|ico|woff|woff2|json))$") {
            expires max;
            access_log off;

            add_header Pragma 'public';
            add_header Cache-Control 'public, must-revalidate, proxy-revalidate';
        }
    }

    location /media/ {
        alias /mnt/data/www/athena/media/;

        if ($request_filename ~ "^.*/(.+\.(jpe?g|png|gif|svg|webp|pdf))$") {
            expires max;
            access_log off;

            add_header Pragma 'public';
            add_header Cache-Control 'public, must-revalidate, proxy-revalidate';
        }
    }

    location / {
        expires 7d;
        add_header Pragma 'public';
        add_header Cache-Control 'public, must-revalidate, proxy-revalidate';
        add_header Alt-Svc 'h3=":$server_port"; ma=86400';

        add_header X-XSS-Protection '1; mode=block';
        add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';
        add_header X-Frame-Options 'DENY';

        proxy_pass  http://127.0.0.1:8002;
    }

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_certificate /etc/letsencrypt/live/manti.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manti.by/privkey.pem;
}
