services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "54321:5432"
    environment:
      - POSTGRES_USER=athena
      - POSTGRES_PASSWORD=athena
      - POSTGRES_DB=athena
    volumes:
      - pgdata:/var/lib/postgresql/

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://athena:athena@postgres:5432/athena
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8002/auth/google/callback}
      - UPLOAD_DIR=/var/lib/app/uploads
      - LOG_PATH=/var/log/app/athena.log
    volumes:
      - .:/srv/app/src/
      - ./media/:/var/lib/app/
      - ./logs/:/var/log/app/
    depends_on:
      - postgres

volumes:
  pgdata:
