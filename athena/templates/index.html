<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena - AI Image Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Athena</h1>
            <div class="header-right">
                <select id="session-selector">
                    <option value="">New Session</option>
                </select>
                <button id="new-session-btn" title="New Session" aria-label="New Session">+</button>
                <div id="user-info" class="user-info" style="display: none;">
                    <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                    <span id="user-name" class="user-name"></span>
                </div>
                <button id="login-btn">Login with Google</button>
                <button id="logout-btn" style="display: none;">Logout</button>
            </div>
        </header>

        <div id="chat-container"></div>

        <div id="auth-prompt" class="hidden">
            <h2>Welcome to Image Generator</h2>
            <p>Please login with your Google account to start generating images with AI.</p>
        </div>

        <div id="input-container" class="hidden">
            <button id="image-btn" title="Attach image" aria-label="Attach image">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </button>
            <input type="file" id="image-input" accept="image/*" multiple>
            <div id="attached-images-container" class="attached-images"></div>
            <textarea id="prompt-input" placeholder="Describe the image you want to generate..." rows="1"></textarea>
            <button id="send-btn">Generate</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
