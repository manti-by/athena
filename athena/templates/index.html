<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena - AI Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="container">
        <header>
            <div class="header-brand">
                <span class="brand-ornament">◆</span>
                <h1>Athena</h1>
            </div>
            <div class="header-right">
                <select id="session-selector">
                    <option value="">New Session</option>
                </select>
                <button id="delete-session-btn" title="Delete Session" aria-label="Delete Session">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
                <button id="new-session-btn" title="New Session" aria-label="New Session">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <div id="user-info" class="user-info">
                    <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                    <span id="user-name" class="user-name"></span>
                </div>
                <button id="login-btn">Sign In</button>
                <button id="logout-btn">Sign Out</button>
            </div>
        </header>

        <div id="chat-container"></div>

        <div id="auth-prompt" class="auth-prompt">
            <div class="auth-content">
                <span class="auth-ornament">◇</span>
                <h2>Welcome to Athena</h2>
                <p>Your creative companion for AI-powered image generation. Sign in to begin crafting visual stories.</p>
                <button id="auth-login-btn">Continue with Google</button>
            </div>
        </div>

        <div id="input-container">
            <div class="input-wrapper">
                <div id="attached-images-container" class="attached-images"></div>
                <div class="input-row">
                    <button id="image-btn" title="Attach image" aria-label="Attach image">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </button>
                    <input type="file" id="image-input" accept="image/*" multiple>
                    <textarea id="prompt-input" placeholder="Describe your vision..." rows="1"></textarea>
                    <button id="send-btn">
                        <span class="btn-text">Generate</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
