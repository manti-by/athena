<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Generator Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #161614;
            color: #eee;
            height: 100vh;
            display: flex;
            max-width: 1000px;
            margin: 0 auto;
            flex-direction: column;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 1px solid #3d3d3b;
        }

        header {
            background: #242b23;
            padding: 1rem;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #login-btn {
            padding: 0.5rem 1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
        }

        #logout-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            color: #eee;
            border: 1px solid #3d3d3b;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .user-name {
            font-size: 0.875rem;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
        }

        .message .image-container {
            margin-top: 0.5rem;
        }

        .message img {
            max-width: 100%;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .message.error {
            background: #3d1a1a;
            color: #ff6b6b;
        }

        .message.loading {
            color: #888;
            font-style: italic;
        }

        #input-container {
            background: #242b23;
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        #prompt-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #3d3d3b;
            border-radius: 0.5rem;
            background: #161614;
            color: #eee;
            font-size: 1rem;
            resize: none;
        }

        #prompt-input:focus {
            outline: none;
            border-color: #e94560;
        }

        #send-btn {
            padding: 0.75rem 1.5rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        #image-btn {
            padding: 0.75rem;
            background: transparent;
            color: #eee;
            border: 1px solid #3d3d3b;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        #image-btn:hover {
            background: #3d3d3b;
        }

        #image-input {
            display: none;
        }

        .attached-images {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .attached-image {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .attached-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.25rem;
        }

        .attached-image .remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:hover {
            background: #d63850;
        }

        #send-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #auth-prompt {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: #888;
        }

        #auth-prompt h2 {
            font-size: 1.5rem;
            color: #eee;
        }

        #auth-prompt p {
            font-size: 1rem;
            max-width: 400px;
            text-align: center;
            line-height: 1.5;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Image Generator</h1>
            <div class="header-right">
                <div id="user-info" class="user-info" style="display: none;">
                    <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                    <span id="user-name" class="user-name"></span>
                </div>
                <button id="login-btn">Login with Google</button>
                <button id="logout-btn" style="display: none;">Logout</button>
            </div>
        </header>

        <div id="chat-container"></div>

        <div id="auth-prompt" class="hidden">
            <h2>Welcome to Image Generator</h2>
            <p>Please login with your Google account to start generating images with AI.</p>
        </div>

        <div id="input-container" class="hidden">
            <button id="image-btn" title="Attach image">📷</button>
            <input type="file" id="image-input" accept="image/*" multiple>
            <textarea id="prompt-input" placeholder="Describe the image you want to generate..." rows="1"></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const imageBtn = document.getElementById('image-btn');
        const imageInput = document.getElementById('image-input');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        const userAvatar = document.getElementById('user-avatar');
        const userName = document.getElementById('user-name');
        const inputContainer = document.getElementById('input-container');
        const authPrompt = document.getElementById('auth-prompt');

        let isAuthenticated = false;

        async function checkAuth() {
            try {
                const response = await fetch('/auth/me');
                const data = await response.json();
                if (data.authenticated) {
                    isAuthenticated = true;
                    userInfo.style.display = 'flex';
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'block';
                    userAvatar.src = data.user.avatar_url || '';
                    userName.textContent = data.user.name || data.user.email;
                    chatContainer.classList.remove('hidden');
                    inputContainer.classList.remove('hidden');
                    authPrompt.classList.add('hidden');
                } else {
                    isAuthenticated = false;
                    userInfo.style.display = 'none';
                    loginBtn.style.display = 'block';
                    logoutBtn.style.display = 'none';
                    chatContainer.classList.add('hidden');
                    inputContainer.classList.add('hidden');
                    authPrompt.classList.remove('hidden');
                }
            } catch (e) {
                isAuthenticated = false;
            }
        }

        loginBtn.addEventListener('click', () => {
            window.location.href = '/auth/google/login';
        });

        logoutBtn.addEventListener('click', async () => {
            await fetch('/auth/logout', { method: 'POST' });
            window.location.reload();
        });

        checkAuth();

        let attachedImages = [];

        function addMessage(content, type, imageData = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            if (type === 'loading') {
                messageDiv.textContent = 'Generating image...';
            } else if (type === 'error') {
                messageDiv.textContent = content;
            } else {
                if (type === 'user' && attachedImages.length > 0) {
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'attached-images';
                    attachedImages.forEach((img, idx) => {
                        const imgEl = document.createElement('img');
                        imgEl.src = img.preview;
                        imgEl.style.width = '60px';
                        imgEl.style.height = '60px';
                        imgEl.style.objectFit = 'cover';
                        imgEl.style.borderRadius = '0.25rem';
                        imgContainer.appendChild(imgEl);
                    });
                    messageDiv.appendChild(imgContainer);
                }

                const textSpan = document.createElement('span');
                textSpan.textContent = content;
                messageDiv.appendChild(textSpan);

                if (imageData) {
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'image-container';
                    const img = document.createElement('img');
                    img.src = imageData;
                    img.alt = 'Generated image';
                    imgContainer.appendChild(img);
                    messageDiv.appendChild(imgContainer);
                }
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderAttachedImages() {
            let container = document.getElementById('attached-images-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'attached-images-container';
                container.className = 'attached-images';
                promptInput.parentNode.insertBefore(container, promptInput);
            }
            container.innerHTML = '';
            attachedImages.forEach((img, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'attached-image';
                const imgEl = document.createElement('img');
                imgEl.src = img.preview;
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.textContent = '×';
                removeBtn.onclick = () => {
                    attachedImages.splice(idx, 1);
                    renderAttachedImages();
                };
                wrapper.appendChild(imgEl);
                wrapper.appendChild(removeBtn);
                container.appendChild(wrapper);
            });
        }

        imageBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const base64 = ev.target.result.split(',')[1];
                    attachedImages.push({ base64, preview: ev.target.result });
                    renderAttachedImages();
                };
                reader.readAsDataURL(file);
            }
            imageInput.value = '';
        });

        async function sendPrompt() {
            if (!isAuthenticated) {
                addMessage('Please login to generate images', 'error');
                return;
            }

            const prompt = promptInput.value.trim();
            if (!prompt && attachedImages.length === 0) return;

            promptInput.value = '';
            promptInput.disabled = true;
            sendBtn.disabled = true;
            imageBtn.disabled = true;

            const imagesToSend = attachedImages.map(img => img.base64);
            attachedImages = [];
            renderAttachedImages();

            addMessage(prompt, 'user');
            addMessage('', 'loading');

            try {
                const response = await fetch('/api/v1/image/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, images: imagesToSend.length > 0 ? imagesToSend : null })
                });

                const lastMessage = chatContainer.lastElementChild;
                lastMessage.remove();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to generate image');
                }

                const data = await response.json();
                addMessage('Here is your generated image:', 'assistant', data.images[0]);
            } catch (error) {
                const lastMessage = chatContainer.lastElementChild;
                if (lastMessage && lastMessage.classList.contains('loading')) {
                    lastMessage.remove();
                }
                addMessage(error.message, 'error');
            } finally {
                promptInput.disabled = false;
                sendBtn.disabled = false;
                imageBtn.disabled = false;
                promptInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendPrompt);

        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendPrompt();
            }
        });
    </script>
</body>
</html>
