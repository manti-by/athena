<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Generator Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #161614;
            color: #eee;
            height: 100vh;
            display: flex;
            max-width: 1000px;
            margin: 0 auto;
            flex-direction: column;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 1px solid #3d3d3b;
        }

        header {
            background: #242b23;
            padding: 1rem;
            text-align: center;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
        }

        .message .image-container {
            margin-top: 0.5rem;
        }

        .message img {
            max-width: 100%;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .message.error {
            background: #3d1a1a;
            color: #ff6b6b;
        }

        .message.loading {
            color: #888;
            font-style: italic;
        }

        #input-container {
            background: #242b23;
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        #prompt-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #3d3d3b;
            border-radius: 0.5rem;
            background: #161614;
            color: #eee;
            font-size: 1rem;
            resize: none;
        }

        #prompt-input:focus {
            outline: none;
            border-color: #e94560;
        }

        #send-btn {
            padding: 0.75rem 1.5rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #d63850;
        }

        #send-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Image Generator</h1>
        </header>

        <div id="chat-container"></div>

        <div id="input-container">
            <textarea id="prompt-input" placeholder="Describe the image you want to generate..." rows="1"></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(content, type, imageData = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            if (type === 'loading') {
                messageDiv.textContent = 'Generating image...';
            } else if (type === 'error') {
                messageDiv.textContent = content;
            } else {
                messageDiv.textContent = content;

                if (imageData) {
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'image-container';
                    const img = document.createElement('img');
                    img.src = imageData;
                    img.alt = 'Generated image';
                    imgContainer.appendChild(img);
                    messageDiv.appendChild(imgContainer);
                }
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendPrompt() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            promptInput.value = '';
            promptInput.disabled = true;
            sendBtn.disabled = true;

            addMessage(prompt, 'user');
            addMessage('', 'loading');

            try {
                const response = await fetch('/api/v1/image/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const lastMessage = chatContainer.lastElementChild;
                lastMessage.remove();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to generate image');
                }

                const data = await response.json();
                addMessage('Here is your generated image:', 'assistant', data.images[0]);
            } catch (error) {
                const lastMessage = chatContainer.lastElementChild;
                if (lastMessage && lastMessage.classList.contains('loading')) {
                    lastMessage.remove();
                }
                addMessage(error.message, 'error');
            } finally {
                promptInput.disabled = false;
                sendBtn.disabled = false;
                promptInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendPrompt);

        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendPrompt();
            }
        });
    </script>
</body>
</html>
